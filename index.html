<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Ачивки Димы и Максима</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 750px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      padding: 2rem 2rem 2.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }

    .subhead {
      color: #4a5568;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      border-left: 4px solid #667eea;
      padding-left: 1rem;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 2rem;
      background: #edf2f7;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      margin-bottom: 1.8rem;
      font-weight: 500;
      color: #2d3748;
    }

    .stats span {
      font-weight: 600;
    }
    .stats .dima { color: #667eea; }
    .stats .maxim { color: #f6ad55; }
    .stats .both { color: #48bb78; }

    /* Форма добавления */
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
    }

    .add-form .row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .add-form input, .add-form textarea {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      transition: 0.2s;
      background: #f7fafc;
      font-family: inherit;
    }

    .add-form input:focus, .add-form textarea:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .add-form textarea {
      border-radius: 24px;
      resize: vertical;
      min-height: 60px;
    }

    .add-form button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .add-form button:hover {
      background: #5a6fd6;
      transform: scale(1.02);
    }

    /* Список ачивок */
    .achievement-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .achievement-item {
      background: #f7fafc;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: 0.2s;
      border: 2px solid transparent;
      flex-wrap: wrap;
    }

    .achievement-item:hover {
      border-color: #e2e8f0;
      background: #f0f4ff;
    }

    .achievement-item.completed-by-both {
      opacity: 0.7;
      background: #e6f7ed;
      border-color: #48bb78;
    }

    .achievement-info {
      flex: 1;
      min-width: 150px;
    }

    .achievement-title {
      font-weight: 600;
      color: #1a202c;
      font-size: 1.1rem;
    }

    .achievement-desc {
      color: #4a5568;
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .checkboxes {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .checkboxes input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkboxes .maxim-label input {
      accent-color: #f6ad55;
    }

    .achievement-actions {
      display: flex;
      gap: 0.2rem;
      margin-left: auto;
    }

    .achievement-actions button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      transition: 0.2s;
      color: #a0aec0;
    }

    .achievement-actions button:hover {
      background: #edf2f7;
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 3rem 0;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .container { padding: 1.5rem; }
      .add-form .row { flex-direction: column; }
      .achievement-item { flex-direction: column; align-items: stretch; }
      .checkboxes { justify-content: space-around; }
      .achievement-actions { margin-left: 0; align-self: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏆 Ачивки</h1>
  

  <div class="stats">
    <span>🙋 Дима: <span class="dima" id="dima-count">0</span></span>
    <span>👫 Максим: <span class="maxim" id="maxim-count">0</span></span>
    <span>✅ Оба: <span class="both" id="both-count">0</span></span>
  </div>

  <!-- Форма добавления -->
  <div class="add-form">
    <div class="row">
      <input type="text" id="titleInput" placeholder="Название ачивки" required>
      <button id="addBtn">➕ Добавить</button>
    </div>
    <textarea id="descInput" placeholder="Описание (необязательно)"></textarea>
  </div>

  <!-- Список -->
  <div id="listContainer" class="achievement-list"></div>
</div>

<script>
  // ---- Хранилище ----
  const STORAGE_KEY = 'achievements2026';

  // ---- Модель данных ----
  let achievements = [];

  // ---- Загрузка из localStorage ----
  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        achievements = JSON.parse(stored);
        // миграция: если у старых записей нет полей completedDima/Maxim, добавим
        achievements = achievements.map(a => ({
          ...a,
          completedDima: a.completedDima !== undefined ? a.completedDima : false,
          completedMaxim: a.completedMaxim !== undefined ? a.completedMaxim : false,
        }));
      } catch (e) {
        achievements = [];
      }
    } else {
      // демо-данные (можно удалить или оставить для примера)
      achievements = [
        { id: 1, title: 'Пробежать 10 км', description: 'За 1 час', completedDima: false, completedMaxim: false },
        { id: 2, title: 'Прочитать 12 книг', description: 'По одной в месяц', completedDima: false, completedMaxim: false },
      ];
    }
    saveData();
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(achievements));
  }

  // ---- Генерация ID ----
  function generateId() {
    return Date.now() + Math.random();
  }

  // ---- Рендеринг ----
  function render() {
    const container = document.getElementById('listContainer');
    const total = achievements.length;

    // Статистика
    const dimaDone = achievements.filter(a => a.completedDima).length;
    const maximDone = achievements.filter(a => a.completedMaxim).length;
    const bothDone = achievements.filter(a => a.completedDima && a.completedMaxim).length;
    document.getElementById('dima-count').textContent = dimaDone;
    document.getElementById('maxim-count').textContent = maximDone;
    document.getElementById('both-count').textContent = bothDone;

    if (total === 0) {
      container.innerHTML = `<div class="empty">✨ Пока нет ачивок. Добавьте первую!</div>`;
      return;
    }

    // Сортируем: сначала те, где не все отметили
    const sorted = [...achievements].sort((a, b) => {
      const aDone = a.completedDima && a.completedMaxim ? 1 : 0;
      const bDone = b.completedDima && b.completedMaxim ? 1 : 0;
      return aDone - bDone;
    });

    container.innerHTML = sorted.map(ach => {
      const bothCompleted = ach.completedDima && ach.completedMaxim;
      const itemClass = bothCompleted ? 'achievement-item completed-by-both' : 'achievement-item';
      return `
        <div class="${itemClass}" data-id="${ach.id}">
          <div class="achievement-info">
            <div class="achievement-title">${escapeHtml(ach.title)}</div>
            ${ach.description ? `<div class="achievement-desc">${escapeHtml(ach.description)}</div>` : ''}
          </div>
          <div class="checkboxes">
            <label class="dima-label">
              <input type="checkbox" class="ach-checkbox dima-check" ${ach.completedDima ? 'checked' : ''}>
              🙋 Дима
            </label>
            <label class="maxim-label">
              <input type="checkbox" class="ach-checkbox maxim-check" ${ach.completedMaxim ? 'checked' : ''}>
              👫 Максим
            </label>
          </div>
          <div class="achievement-actions">
            <button class="delete-btn" title="Удалить">✕</button>
          </div>
        </div>
      `;
    }).join('');

    // ---- События на чекбоксы ----
    container.querySelectorAll('.ach-checkbox').forEach(cb => {
      cb.addEventListener('change', function() {
        const item = this.closest('.achievement-item');
        const id = Number(item.dataset.id);
        const ach = achievements.find(a => a.id === id);
        if (!ach) return;

        const isDima = this.classList.contains('dima-check');
        if (isDima) {
          ach.completedDima = this.checked;
        } else {
          ach.completedMaxim = this.checked;
        }
        saveData();
        render();
      });
    });

    // ---- Удаление ----
    container.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const item = this.closest('.achievement-item');
        const id = Number(item.dataset.id);
        if (confirm('Удалить ачивку?')) {
          achievements = achievements.filter(a => a.id !== id);
          saveData();
          render();
        }
      });
    });
  }

  // ---- Защита от XSS ----
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ---- Добавление ----
  document.getElementById('addBtn').addEventListener('click', function() {
    const titleInput = document.getElementById('titleInput');
    const descInput = document.getElementById('descInput');
    const title = titleInput.value.trim();
    const desc = descInput.value.trim();

    if (!title) {
      alert('Введите название ачивки!');
      return;
    }

    achievements.push({
      id: generateId(),
      title: title,
      description: desc,
      completedDima: false,
      completedMaxim: false,
    });

    saveData();
    render();
    titleInput.value = '';
    descInput.value = '';
    titleInput.focus();
  });

  // ---- Enter в поле названия ----
  document.getElementById('titleInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('addBtn').click();
    }
  });

  // ---- Инициализация ----
  loadData();
  render();
</script>

</body>
</html>
