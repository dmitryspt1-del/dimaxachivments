<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎯 Ачивки Димы и Максима</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      padding: 2rem 2rem 2.5rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #4a5568;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      border-left: 4px solid #667eea;
      padding-left: 1rem;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 2rem;
      background: #edf2f7;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      margin-bottom: 1.8rem;
      font-weight: 500;
      color: #2d3748;
    }
    .stats span { font-weight: 600; }
    .stats .dima { color: #667eea; }
    .stats .maxim { color: #f6ad55; }
    .stats .both { color: #48bb78; }

    .add-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
      background: #f7fafc;
      padding: 1.2rem;
      border-radius: 24px;
    }
    .add-form .row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .add-form input, .add-form textarea {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      transition: 0.2s;
      background: white;
      font-family: inherit;
    }
    .add-form input:focus, .add-form textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
    }
    .add-form textarea {
      border-radius: 24px;
      resize: vertical;
      min-height: 60px;
    }
    .add-form button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .add-form button:hover {
      background: #5a6fd6;
      transform: scale(1.02);
    }

    .achievement-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .achievement-item {
      background: #f7fafc;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: 0.2s;
      border: 2px solid transparent;
    }
    .achievement-item:hover {
      border-color: #e2e8f0;
      background: #f0f4ff;
    }
    .achievement-item.completed-by-both {
      opacity: 0.7;
      background: #e6f7ed;
      border-color: #48bb78;
    }
    .achievement-item .main-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .achievement-info {
      flex: 1;
      min-width: 150px;
    }
    .achievement-title {
      font-weight: 600;
      color: #1a202c;
      font-size: 1.1rem;
    }
    .achievement-desc {
      color: #4a5568;
      font-size: 0.9rem;
      margin-top: 2px;
    }
    .achievement-file {
      margin-top: 0.4rem;
    }
    .achievement-file a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .achievement-file a:hover {
      text-decoration: underline;
    }
    .achievement-file img,
    .achievement-file video {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      margin-top: 0.4rem;
      border: 1px solid #e2e8f0;
      display: block;
    }
    .achievement-file video {
      background: #000;
    }
    .file-edit-area {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .file-edit-area input[type="file"] {
      flex: 1;
      min-width: 150px;
      padding: 0.4rem;
      border: 2px dashed #e2e8f0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
    }
    .file-edit-area button {
      background: #48bb78;
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
    }
    .file-edit-area button:hover {
      background: #38a169;
    }
    .file-edit-area .cancel-btn {
      background: #a0aec0;
    }
    .file-edit-area .cancel-btn:hover {
      background: #718096;
    }
    .file-edit-area .remove-btn {
      background: #fc8181;
    }
    .file-edit-area .remove-btn:hover {
      background: #e53e3e;
    }
    .file-edit-area .uploading {
      color: #667eea;
      font-weight: 500;
    }

    .checkboxes {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .checkboxes input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkboxes .maxim-label input {
      accent-color: #f6ad55;
    }
    .achievement-actions {
      display: flex;
      gap: 0.2rem;
      margin-left: auto;
    }
    .achievement-actions button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      transition: 0.2s;
      color: #a0aec0;
    }
    .achievement-actions button:hover {
      background: #edf2f7;
      color: #e53e3e;
    }
    .attach-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #667eea;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .attach-btn:hover {
      background: #edf2f7;
      color: #5a6fd6;
    }
    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 3rem 0;
      font-size: 1.1rem;
    }
    .loading {
      text-align: center;
      color: #667eea;
      padding: 2rem 0;
    }
    @media (max-width: 600px) {
      .container { padding: 1.5rem; }
      .add-form .row { flex-direction: column; }
      .achievement-item .main-row { flex-direction: column; align-items: stretch; }
      .checkboxes { justify-content: space-around; }
      .achievement-actions { margin-left: 0; align-self: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏆 Ачивки</h1>
  <div class="subhead">Совместный список Димы и Максима на 2026 год</div>

  <div class="stats">
    <span>🙋 Дима: <span class="dima" id="dima-count">0</span></span>
    <span>👫 Максим: <span class="maxim" id="maxim-count">0</span></span>
    <span>✅ Оба: <span class="both" id="both-count">0</span></span>
  </div>

  <div class="add-form">
    <div class="row">
      <input type="text" id="titleInput" placeholder="Название ачивки" required />
      <button id="addBtn">➕ Добавить</button>
    </div>
    <textarea id="descInput" placeholder="Описание (необязательно)"></textarea>
  </div>

  <div id="listContainer" class="achievement-list">
    <div class="loading">⏳ Загрузка данных...</div>
  </div>
</div>

<script>
  // ---- Конфиг Firebase (ваш, уже вставлен) ----
  const firebaseConfig = {
    apiKey: "AIzaSyBU8d555s2UwmcsMuPr19lTEWE12ESvlaE",
    authDomain: "dimaxachivments.firebaseapp.com",
    projectId: "dimaxachivments",
    storageBucket: "dimaxachivments.firebasestorage.app",
    messagingSenderId: "1607300611",
    appId: "1:1607300611:web:1af2ef66270d40b7dec036"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const DB_PATH = 'achievements';

  let achievements = [];

  // ---- ВСТАВЬТЕ СВОЙ API КЛЮЧ ОТ IMGBB ----
  const IMGBB_API_KEY = '74961692cbceea32ddf4c632ec9678e6';

  // ---- Функция загрузки файла на ImgBB ----
  async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('key', IMGBB_API_KEY);
    formData.append('image', file);

    const response = await fetch('https://api.imgbb.com/1/upload', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(`ImgBB error: ${error.error?.message || response.statusText}`);
    }

    const result = await response.json();
    return result.data.url; // прямая ссылка на изображение
  }

  // ---- Вспомогательные функции для определения типа файла ----
  function getFileExtensionFromUrl(url) {
    try {
      const path = new URL(url).pathname;
      const parts = path.split('.');
      return parts.length > 1 ? parts.pop().toLowerCase() : '';
    } catch {
      return '';
    }
  }

  function isImage(url) {
    const ext = getFileExtensionFromUrl(url);
    return ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg', 'ico'].includes(ext);
  }

  function isVideo(url) {
    const ext = getFileExtensionFromUrl(url);
    return ['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'wmv', 'm4v'].includes(ext);
  }

  // ---- Подписка на изменения ----
  function subscribeToAchievements() {
    db.ref(DB_PATH).on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        achievements = Object.keys(data).map(key => ({
          id: key,
          ...data[key]
        }));
      } else {
        achievements = [];
      }
      render();
    }, (error) => {
      console.error('Ошибка загрузки:', error);
      document.getElementById('listContainer').innerHTML =
        `<div class="empty">❌ Ошибка загрузки: ${error.message}. Проверьте интернет и настройки Firebase.</div>`;
    });
  }

  // ---- Добавление новой ачивки (без файла) ----
  async function addAchievement(title, description) {
    try {
      const newRef = db.ref(DB_PATH).push();
      await newRef.set({
        title: title,
        description: description || '',
        completedDima: false,
        completedMaxim: false,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        fileURL: null
      });
    } catch (error) {
      alert('Ошибка при добавлении: ' + error.message);
    }
  }

  // ---- Обновление ссылки на файл ----
  async function updateFileUrl(id, url) {
    try {
      await db.ref(`${DB_PATH}/${id}/fileURL`).set(url || null);
    } catch (error) {
      alert('Ошибка обновления файла: ' + error.message);
    }
  }

  // ---- Обновление чекбокса ----
  async function toggleCheckbox(id, field, value) {
    try {
      await db.ref(`${DB_PATH}/${id}/${field}`).set(value);
    } catch (error) {
      alert('Ошибка обновления: ' + error.message);
    }
  }

  // ---- Удаление ачивки ----
  async function deleteAchievement(id) {
    try {
      await db.ref(`${DB_PATH}/${id}`).remove();
    } catch (error) {
      alert('Ошибка удаления: ' + error.message);
    }
  }

  // ---- Рендеринг ----
  function render() {
    const container = document.getElementById('listContainer');
    const total = achievements.length;

    const dimaDone = achievements.filter(a => a.completedDima).length;
    const maximDone = achievements.filter(a => a.completedMaxim).length;
    const bothDone = achievements.filter(a => a.completedDima && a.completedMaxim).length;
    document.getElementById('dima-count').textContent = dimaDone;
    document.getElementById('maxim-count').textContent = maximDone;
    document.getElementById('both-count').textContent = bothDone;

    if (total === 0) {
      container.innerHTML = `<div class="empty">✨ Пока нет ачивок. Добавьте первую!</div>`;
      return;
    }

    const sorted = [...achievements].sort((a, b) => {
      const aDone = a.completedDima && a.completedMaxim ? 1 : 0;
      const bDone = b.completedDima && b.completedMaxim ? 1 : 0;
      return aDone - bDone;
    });

    container.innerHTML = sorted.map(ach => {
      const bothCompleted = ach.completedDima && ach.completedMaxim;
      const itemClass = bothCompleted ? 'achievement-item completed-by-both' : 'achievement-item';

      // Отображение файла
      let fileHtml = '';
      if (ach.fileURL) {
        const url = ach.fileURL;
        if (isImage(url)) {
          fileHtml = `
            <div class="achievement-file">
              <a href="${url}" target="_blank">🖼️ Открыть изображение</a>
              <img src="${url}" alt="Превью" loading="lazy" />
            </div>
          `;
        } else if (isVideo(url)) {
          fileHtml = `
            <div class="achievement-file">
              <a href="${url}" target="_blank">🎬 Открыть видео</a>
              <video controls preload="metadata" src="${url}"></video>
            </div>
          `;
        } else {
          fileHtml = `
            <div class="achievement-file">
              <a href="${url}" target="_blank">📎 Ссылка на файл</a>
            </div>
          `;
        }
      }

      // Кнопка "Прикрепить файл"
      const attachBtnHtml = `
        <button class="attach-btn" data-id="${ach.id}">
          ${ach.fileURL ? '✏️ Изменить файл' : '📎 Прикрепить файл'}
        </button>
      `;

      // Область редактирования файла (скрыта по умолчанию)
      const editAreaHtml = `
        <div class="file-edit-area" id="edit-${ach.id}" style="display: none;">
          <input type="file" accept="image/*,video/*,.gif" />
          <span class="uploading" style="display:none;">⏳ Загрузка...</span>
          <button class="save-file-btn" data-id="${ach.id}">Загрузить</button>
          <button class="cancel-edit-btn" data-id="${ach.id}">Отмена</button>
          ${ach.fileURL ? `<button class="remove-file-btn" data-id="${ach.id}">🗑️ Удалить</button>` : ''}
        </div>
      `;

      return `
        <div class="${itemClass}" data-id="${ach.id}">
          <div class="main-row">
            <div class="achievement-info">
              <div class="achievement-title">${escapeHtml(ach.title)}</div>
              ${ach.description ? `<div class="achievement-desc">${escapeHtml(ach.description)}</div>` : ''}
              ${fileHtml}
              ${attachBtnHtml}
              ${editAreaHtml}
            </div>
            <div class="checkboxes">
              <label class="dima-label">
                <input type="checkbox" class="ach-checkbox dima-check" ${ach.completedDima ? 'checked' : ''} />
                🙋 Дима
              </label>
              <label class="maxim-label">
                <input type="checkbox" class="ach-checkbox maxim-check" ${ach.completedMaxim ? 'checked' : ''} />
                👫 Максим
              </label>
            </div>
            <div class="achievement-actions">
              <button class="delete-btn" title="Удалить">✕</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // ---- События на чекбоксы ----
    container.querySelectorAll('.ach-checkbox').forEach(cb => {
      cb.addEventListener('change', function() {
        const item = this.closest('.achievement-item');
        const id = item.dataset.id;
        const isDima = this.classList.contains('dima-check');
        const field = isDima ? 'completedDima' : 'completedMaxim';
        toggleCheckbox(id, field, this.checked);
      });
    });

    // ---- События на удаление ----
    container.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const item = this.closest('.achievement-item');
        const id = item.dataset.id;
        if (confirm('Удалить ачивку?')) {
          deleteAchievement(id);
        }
      });
    });

    // ---- События на кнопку "Прикрепить файл" (показать/скрыть область) ----
    container.querySelectorAll('.attach-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const editArea = document.getElementById(`edit-${id}`);
        if (editArea.style.display === 'none') {
          editArea.style.display = 'flex';
        } else {
          editArea.style.display = 'none';
        }
      });
    });

    // ---- События на "Загрузить" ----
    container.querySelectorAll('.save-file-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        const id = this.dataset.id;
        const editArea = document.getElementById(`edit-${id}`);
        const fileInput = editArea.querySelector('input[type="file"]');
        const file = fileInput.files[0];
        if (!file) {
          alert('Выберите файл!');
          return;
        }

        // Показать индикатор загрузки
        const statusSpan = editArea.querySelector('.uploading');
        statusSpan.style.display = 'inline';
        this.disabled = true;

        try {
          const url = await uploadToImgBB(file);
          await updateFileUrl(id, url);
          editArea.style.display = 'none';
        } catch (error) {
          alert('Ошибка загрузки: ' + error.message);
        } finally {
          statusSpan.style.display = 'none';
          this.disabled = false;
          fileInput.value = ''; // сбросить поле
        }
      });
    });

    // ---- События на "Отмена" ----
    container.querySelectorAll('.cancel-edit-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        document.getElementById(`edit-${id}`).style.display = 'none';
        // сбросить выбранный файл и индикатор
        const editArea = document.getElementById(`edit-${id}`);
        const fileInput = editArea.querySelector('input[type="file"]');
        fileInput.value = '';
        editArea.querySelector('.uploading').style.display = 'none';
        const saveBtn = editArea.querySelector('.save-file-btn');
        saveBtn.disabled = false;
      });
    });

    // ---- События на "Удалить файл" ----
    container.querySelectorAll('.remove-file-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        if (confirm('Удалить прикреплённый файл?')) {
          updateFileUrl(id, null);
          const editArea = document.getElementById(`edit-${id}`);
          editArea.style.display = 'none';
        }
      });
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ---- Обработчик добавления новой ачивки ----
  document.getElementById('addBtn').addEventListener('click', function() {
    const titleInput = document.getElementById('titleInput');
    const descInput = document.getElementById('descInput');
    const title = titleInput.value.trim();
    const desc = descInput.value.trim();

    if (!title) {
      alert('Введите название ачивки!');
      return;
    }

    addAchievement(title, desc);
    titleInput.value = '';
    descInput.value = '';
    titleInput.focus();
  });

  document.getElementById('titleInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('addBtn').click();
    }
  });

  // ---- Старт ----
  subscribeToAchievements();
</script>
</body>
</html>
