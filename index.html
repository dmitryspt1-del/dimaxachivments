<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎯 Ачивки Димы и Максима</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 2rem 1rem 2rem;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      padding: 2rem 2rem 2.5rem;
      position: relative;
    }

    /* ---- Липкая шапка ---- */
    .sticky-header {
      position: sticky;
      top: 0;
      background: white;
      z-index: 10;
      padding-top: 0.5rem;
      padding-bottom: 1rem;
      margin-top: -0.5rem;
      border-bottom: 1px solid #edf2f7;
      margin-bottom: 1.5rem;
    }
    .sticky-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }
    .sticky-header .subhead {
      color: #4a5568;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      border-left: 4px solid #667eea;
      padding-left: 1rem;
    }
    .sticky-header .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 2rem;
      background: #edf2f7;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      margin-bottom: 1.8rem;
      font-weight: 500;
      color: #2d3748;
    }
    .sticky-header .stats span { font-weight: 600; }
    .sticky-header .stats .dima { color: #667eea; }
    .sticky-header .stats .maxim { color: #f6ad55; }
    .sticky-header .stats .both { color: #48bb78; }
    .sticky-header .stats .total { color: #2d3748; }
    .sticky-header .stats .done { color: #48bb78; }

    .sticky-header .add-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: #f7fafc;
      padding: 1.2rem;
      border-radius: 24px;
      margin-bottom: 0.5rem;
    }
    .sticky-header .add-form .row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .sticky-header .add-form input,
    .sticky-header .add-form textarea {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      font-size: 1rem;
      transition: 0.2s;
      background: white;
      font-family: inherit;
    }
    .sticky-header .add-form input:focus,
    .sticky-header .add-form textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
    }
    .sticky-header .add-form textarea {
      border-radius: 24px;
      resize: vertical;
      min-height: 60px;
    }
    .sticky-header .add-form button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .sticky-header .add-form button:hover {
      background: #5a6fd6;
      transform: scale(1.02);
    }

    /* ---- Список ачивок (прокручивается) ---- */
    .achievement-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding-top: 0.5rem;
    }

    .achievement-item {
      background: #f7fafc;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: 0.2s;
      border: 2px solid transparent;
    }
    .achievement-item:hover {
      border-color: #e2e8f0;
      background: #f0f4ff;
    }
    .achievement-item.completed-by-both {
      opacity: 0.7;
      background: #e6f7ed;
      border-color: #48bb78;
    }
    .achievement-item .main-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .achievement-info {
      flex: 1;
      min-width: 150px;
    }
    .achievement-title {
      font-weight: 600;
      color: #1a202c;
      font-size: 1.1rem;
    }
    .achievement-desc {
      color: #4a5568;
      font-size: 0.9rem;
      margin-top: 2px;
    }
    .achievement-files {
      margin-top: 0.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .file-item .owner-label {
      font-weight: 600;
      font-size: 0.8rem;
      background: #edf2f7;
      padding: 0.1rem 0.5rem;
      border-radius: 30px;
    }
    .file-item .owner-label.dima-label { color: #667eea; background: #ebf0ff; }
    .file-item .owner-label.maxim-label { color: #f6ad55; background: #fff5e6; }
    .file-item a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .file-item a:hover {
      text-decoration: underline;
    }
    .file-item img,
    .file-item video {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      margin-top: 0.2rem;
      border: 1px solid #e2e8f0;
      display: block;
    }
    .file-item video {
      background: #000;
    }

    .file-edit-area {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .file-edit-area input[type="file"] {
      flex: 1;
      min-width: 150px;
      padding: 0.4rem;
      border: 2px dashed #e2e8f0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
    }
    .file-edit-area button {
      background: #48bb78;
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
    }
    .file-edit-area button:hover {
      background: #38a169;
    }
    .file-edit-area .cancel-btn {
      background: #a0aec0;
    }
    .file-edit-area .cancel-btn:hover {
      background: #718096;
    }
    .file-edit-area .remove-btn {
      background: #fc8181;
    }
    .file-edit-area .remove-btn:hover {
      background: #e53e3e;
    }
    .file-edit-area .uploading {
      color: #667eea;
      font-weight: 500;
    }

    .checkboxes {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .checkboxes input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checkboxes .maxim-label input {
      accent-color: #f6ad55;
    }
    .achievement-actions {
      display: flex;
      gap: 0.2rem;
      margin-left: auto;
      align-items: center;
    }
    .achievement-actions button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      transition: 0.2s;
      color: #a0aec0;
    }
    .achievement-actions button:hover {
      background: #edf2f7;
      color: #e53e3e;
    }

    /* ---- Две кнопки-скрепки ---- */
    .attach-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      transition: 0.2s;
      color: #a0aec0;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      line-height: 1;
      font-weight: 500;
    }
    .attach-btn:hover {
      background: #edf2f7;
      border-color: #e2e8f0;
    }
    .attach-btn:active {
      transform: scale(0.92);
    }
    .attach-btn.has-file {
      color: #667eea;
    }
    .attach-btn.dima-attach {
      color: #667eea;
    }
    .attach-btn.dima-attach:hover {
      background: #ebf0ff;
      border-color: #667eea;
    }
    .attach-btn.maxim-attach {
      color: #f6ad55;
    }
    .attach-btn.maxim-attach:hover {
      background: #fff5e6;
      border-color: #f6ad55;
    }
    .attach-btn .initials {
      font-size: 0.7rem;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 3rem 0;
      font-size: 1.1rem;
    }
    .loading {
      text-align: center;
      color: #667eea;
      padding: 2rem 0;
    }

    /* ---- Toast уведомления (оставляем как есть) ---- */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 380px;
      width: 100%;
    }
    .toast {
      background: #1a202c;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      animation: slideIn 0.3s ease;
      cursor: pointer;
      transition: 0.3s;
    }
    .toast:hover {
      transform: scale(1.02);
    }
    .toast .toast-icon {
      font-size: 1.6rem;
    }
    .toast .toast-content {
      flex: 1;
    }
    .toast .toast-title {
      font-weight: 600;
      font-size: 1rem;
    }
    .toast .toast-desc {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 2px;
    }
    .toast .toast-close {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .toast .toast-close:hover {
      color: white;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @media (max-width: 480px) {
      .toast-container { right: 10px; left: 10px; max-width: 100%; }
    }

    /* ---- Бадж ---- */
    .badge {
      background: #e53e3e;
      color: white;
      border-radius: 30px;
      padding: 0.1rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 700;
      margin-left: 0.6rem;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .sticky-header .add-form .row { flex-direction: column; }
      .achievement-item .main-row { flex-direction: column; align-items: stretch; }
      .checkboxes { justify-content: space-around; }
      .achievement-actions { margin-left: 0; align-self: flex-end; }
      .sticky-header .stats { gap: 0.8rem 1.2rem; padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Липкая шапка -->
  <div class="sticky-header">
    <h1>
      🏆 Ачивки
      <span id="badge-container"></span>
    </h1>
    <div class="subhead">Совместный список Димы и Максима на 2026 год</div>

    <div class="stats">
      <span>📊 Всего: <span class="total" id="total-count">0</span></span>
      <span>✅ Выполнено (оба): <span class="done" id="done-both-count">0</span></span>
      <span>🙋 Дима: <span class="dima" id="dima-count">0</span></span>
      <span>👫 Максим: <span class="maxim" id="maxim-count">0</span></span>
    </div>

    <div class="add-form">
      <div class="row">
        <input type="text" id="titleInput" placeholder="Название ачивки" required />
        <button id="addBtn">➕ Добавить</button>
      </div>
      <textarea id="descInput" placeholder="Описание (необязательно)"></textarea>
    </div>
  </div>

  <!-- Список ачивок (прокручивается) -->
  <div id="listContainer" class="achievement-list">
    <div class="loading">⏳ Загрузка данных...</div>
  </div>
</div>

<!-- Контейнер для тостов -->
<div id="toastContainer" class="toast-container"></div>

<script>
  // ---- Конфиг Firebase ----
  const firebaseConfig = {
    apiKey: "AIzaSyBU8d555s2UwmcsMuPr19lTEWE12ESvlaE",
    authDomain: "dimaxachivments.firebaseapp.com",
    projectId: "dimaxachivments",
    storageBucket: "dimaxachivments.firebasestorage.app",
    messagingSenderId: "1607300611",
    appId: "1:1607300611:web:1af2ef66270d40b7dec036"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const DB_PATH = 'achievements';

  let achievements = [];
  let newAchievementIds = new Set();
  let lastVisit = parseInt(localStorage.getItem('lastVisitTime')) || 0;

  // ---- ВСТАВЬТЕ СВОЙ API КЛЮЧ ОТ IMGBB ----
  const IMGBB_API_KEY = '74961692cbceea32ddf4c632ec9678e6';

  // ---- Функция загрузки файла на ImgBB ----
  async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('key', IMGBB_API_KEY);
    formData.append('image', file);

    const response = await fetch('https://api.imgbb.com/1/upload', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(`ImgBB error: ${error.error?.message || response.statusText}`);
    }

    const result = await response.json();
    return result.data.url;
  }

  // ---- Вспомогательные функции для определения типа файла ----
  function getFileExtensionFromUrl(url) {
    try {
      const path = new URL(url).pathname;
      const parts = path.split('.');
      return parts.length > 1 ? parts.pop().toLowerCase() : '';
    } catch {
      return '';
    }
  }

  function isImage(url) {
    const ext = getFileExtensionFromUrl(url);
    return ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg', 'ico'].includes(ext);
  }

  function isVideo(url) {
    const ext = getFileExtensionFromUrl(url);
    return ['mp4', 'webm', 'mov', 'avi', 'mkv', 'flv', 'wmv', 'm4v'].includes(ext);
  }

  // ---- Уведомления (тосты и бадж) ----
  function showToast(title, desc, icon = '🎉') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <span class="toast-icon">${icon}</span>
      <div class="toast-content">
        <div class="toast-title">${title}</div>
        ${desc ? `<div class="toast-desc">${desc}</div>` : ''}
      </div>
      <button class="toast-close">&times;</button>
    `;
    container.appendChild(toast);

    toast.querySelector('.toast-close').addEventListener('click', (e) => {
      e.stopPropagation();
      toast.remove();
    });
    toast.addEventListener('click', () => {
      toast.remove();
    });

    setTimeout(() => {
      if (toast.parentNode) toast.remove();
    }, 5000);
  }

  function checkNewAchievements() {
    const now = Date.now();
    const newAchs = achievements.filter(a => {
      if (!a.createdAt) return false;
      if (a.createdAt <= lastVisit) return false;
      if (newAchievementIds.has(a.id)) return false;
      return true;
    });

    if (newAchs.length > 0) {
      if (newAchs.length === 1) {
        const ach = newAchs[0];
        showToast(`Новая ачивка: ${ach.title}`, ach.description || '', '✨');
      } else {
        showToast(`Новых ачивок: ${newAchs.length}`, 'Нажмите, чтобы посмотреть', '📢');
      }
      newAchs.forEach(a => newAchievementIds.add(a.id));
      lastVisit = now;
      localStorage.setItem('lastVisitTime', String(now));
      updateBadge();
    }
  }

  function updateBadge() {
    const badgeContainer = document.getElementById('badge-container');
    const newCount = achievements.filter(a => {
      return a.createdAt && a.createdAt > lastVisit && !newAchievementIds.has(a.id);
    }).length;
    if (newCount > 0) {
      badgeContainer.innerHTML = `<span class="badge">${newCount}</span>`;
    } else {
      badgeContainer.innerHTML = '';
    }
  }

  // ---- Подписка на изменения ----
  function subscribeToAchievements() {
    db.ref(DB_PATH).on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        achievements = Object.keys(data).map(key => ({
          id: key,
          ...data[key]
        }));
      } else {
        achievements = [];
      }
      checkNewAchievements();
      render();
      updateBadge();
    }, (error) => {
      console.error('Ошибка загрузки:', error);
      document.getElementById('listContainer').innerHTML =
        `<div class="empty">❌ Ошибка загрузки: ${error.message}. Проверьте интернет и настройки Firebase.</div>`;
    });
  }

  // ---- Добавление новой ачивки ----
  async function addAchievement(title, description) {
    try {
      const newRef = db.ref(DB_PATH).push();
      await newRef.set({
        title: title,
        description: description || '',
        completedDima: false,
        completedMaxim: false,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        fileDima: null,
        fileMaxim: null
      });
    } catch (error) {
      alert('Ошибка при добавлении: ' + error.message);
    }
  }

  // ---- Обновление ссылки на файл ----
  async function updateFileUrl(id, owner, url) {
    try {
      const field = owner === 'Dima' ? 'fileDima' : 'fileMaxim';
      await db.ref(`${DB_PATH}/${id}/${field}`).set(url || null);
    } catch (error) {
      alert('Ошибка обновления файла: ' + error.message);
    }
  }

  // ---- Обновление чекбокса ----
  async function toggleCheckbox(id, field, value) {
    try {
      await db.ref(`${DB_PATH}/${id}/${field}`).set(value);
    } catch (error) {
      alert('Ошибка обновления: ' + error.message);
    }
  }

  // ---- Удаление ачивки ----
  async function deleteAchievement(id) {
    try {
      await db.ref(`${DB_PATH}/${id}`).remove();
    } catch (error) {
      alert('Ошибка удаления: ' + error.message);
    }
  }

  // ---- Рендеринг ----
  function render() {
    const container = document.getElementById('listContainer');
    const total = achievements.length;

    const dimaDone = achievements.filter(a => a.completedDima).length;
    const maximDone = achievements.filter(a => a.completedMaxim).length;
    const bothDone = achievements.filter(a => a.completedDima && a.completedMaxim).length;

    document.getElementById('total-count').textContent = total;
    document.getElementById('done-both-count').textContent = bothDone;
    document.getElementById('dima-count').textContent = dimaDone;
    document.getElementById('maxim-count').textContent = maximDone;

    if (total === 0) {
      container.innerHTML = `<div class="empty">✨ Пока нет ачивок. Добавьте первую!</div>`;
      return;
    }

    const sorted = [...achievements].sort((a, b) => {
      const aDone = a.completedDima && a.completedMaxim ? 1 : 0;
      const bDone = b.completedDima && b.completedMaxim ? 1 : 0;
      return aDone - bDone;
    });

    container.innerHTML = sorted.map(ach => {
      const bothCompleted = ach.completedDima && ach.completedMaxim;
      const itemClass = bothCompleted ? 'achievement-item completed-by-both' : 'achievement-item';

      function renderFile(url, owner) {
        if (!url) return '';
        const ownerLabel = owner === 'Dima' ? 'Дима' : 'Максим';
        const labelClass = owner === 'Dima' ? 'dima-label' : 'maxim-label';
        let content = '';
        if (isImage(url)) {
          content = `<a href="${url}" target="_blank">🖼️ Открыть</a><img src="${url}" alt="Превью" loading="lazy" />`;
        } else if (isVideo(url)) {
          content = `<a href="${url}" target="_blank">🎬 Открыть</a><video controls preload="metadata" src="${url}"></video>`;
        } else {
          content = `<a href="${url}" target="_blank">📎 Скачать</a>`;
        }
        return `
          <div class="file-item">
            <span class="owner-label ${labelClass}">${ownerLabel}</span>
            ${content}
          </div>
        `;
      }

      const attachDimaHtml = `
        <button class="attach-btn dima-attach ${ach.fileDima ? 'has-file' : ''}" 
                data-id="${ach.id}" data-owner="Dima"
                title="${ach.fileDima ? 'Изменить файл Димы' : 'Прикрепить файл Димы'}">
          📎<span class="initials">Д</span>
        </button>
      `;
      const attachMaximHtml = `
        <button class="attach-btn maxim-attach ${ach.fileMaxim ? 'has-file' : ''}" 
                data-id="${ach.id}" data-owner="Maxim"
                title="${ach.fileMaxim ? 'Изменить файл Максима' : 'Прикрепить файл Максима'}">
          📎<span class="initials">М</span>
        </button>
      `;

      const editAreaDima = `
        <div class="file-edit-area" id="edit-${ach.id}-Dima" style="display: none;">
          <input type="file" accept="image/*,video/*,.gif" />
          <span class="uploading" style="display:none;">⏳ Загрузка...</span>
          <button class="save-file-btn" data-id="${ach.id}" data-owner="Dima">Загрузить</button>
          <button class="cancel-edit-btn" data-id="${ach.id}" data-owner="Dima">Отмена</button>
          ${ach.fileDima ? `<button class="remove-file-btn" data-id="${ach.id}" data-owner="Dima">🗑️ Удалить</button>` : ''}
        </div>
      `;
      const editAreaMaxim = `
        <div class="file-edit-area" id="edit-${ach.id}-Maxim" style="display: none;">
          <input type="file" accept="image/*,video/*,.gif" />
          <span class="uploading" style="display:none;">⏳ Загрузка...</span>
          <button class="save-file-btn" data-id="${ach.id}" data-owner="Maxim">Загрузить</button>
          <button class="cancel-edit-btn" data-id="${ach.id}" data-owner="Maxim">Отмена</button>
          ${ach.fileMaxim ? `<button class="remove-file-btn" data-id="${ach.id}" data-owner="Maxim">🗑️ Удалить</button>` : ''}
        </div>
      `;

      let filesHtml = '';
      if (ach.fileDima || ach.fileMaxim) {
        filesHtml = `<div class="achievement-files">`;
        if (ach.fileDima) filesHtml += renderFile(ach.fileDima, 'Dima');
        if (ach.fileMaxim) filesHtml += renderFile(ach.fileMaxim, 'Maxim');
        filesHtml += `</div>`;
      }

      return `
        <div class="${itemClass}" data-id="${ach.id}">
          <div class="main-row">
            <div class="achievement-info">
              <div class="achievement-title">${escapeHtml(ach.title)}</div>
              ${ach.description ? `<div class="achievement-desc">${escapeHtml(ach.description)}</div>` : ''}
              ${filesHtml}
            </div>
            <div class="checkboxes">
              <label class="dima-label">
                <input type="checkbox" class="ach-checkbox dima-check" ${ach.completedDima ? 'checked' : ''} />
                🙋 Дима
              </label>
              <label class="maxim-label">
                <input type="checkbox" class="ach-checkbox maxim-check" ${ach.completedMaxim ? 'checked' : ''} />
                👫 Максим
              </label>
            </div>
            <div class="achievement-actions">
              ${attachDimaHtml}
              ${attachMaximHtml}
              <button class="delete-btn" title="Удалить">✕</button>
            </div>
          </div>
          ${editAreaDima}
          ${editAreaMaxim}
        </div>
      `;
    }).join('');

    // ---- События ----
    container.querySelectorAll('.ach-checkbox').forEach(cb => {
      cb.addEventListener('change', function() {
        const item = this.closest('.achievement-item');
        const id = item.dataset.id;
        const isDima = this.classList.contains('dima-check');
        const field = isDima ? 'completedDima' : 'completedMaxim';
        toggleCheckbox(id, field, this.checked);
      });
    });

    container.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const item = this.closest('.achievement-item');
        const id = item.dataset.id;
        if (confirm('Удалить ачивку?')) {
          deleteAchievement(id);
        }
      });
    });

    container.querySelectorAll('.attach-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const owner = this.dataset.owner;
        const editArea = document.getElementById(`edit-${id}-${owner}`);
        if (editArea.style.display === 'none') {
          editArea.style.display = 'flex';
        } else {
          editArea.style.display = 'none';
        }
      });
    });

    container.querySelectorAll('.save-file-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        const id = this.dataset.id;
        const owner = this.dataset.owner;
        const editArea = document.getElementById(`edit-${id}-${owner}`);
        const fileInput = editArea.querySelector('input[type="file"]');
        const file = fileInput.files[0];
        if (!file) {
          alert('Выберите файл!');
          return;
        }

        const statusSpan = editArea.querySelector('.uploading');
        statusSpan.style.display = 'inline';
        this.disabled = true;

        try {
          const url = await uploadToImgBB(file);
          await updateFileUrl(id, owner, url);
          editArea.style.display = 'none';
        } catch (error) {
          alert('Ошибка загрузки: ' + error.message);
        } finally {
          statusSpan.style.display = 'none';
          this.disabled = false;
          fileInput.value = '';
        }
      });
    });

    container.querySelectorAll('.cancel-edit-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const owner = this.dataset.owner;
        const editArea = document.getElementById(`edit-${id}-${owner}`);
        editArea.style.display = 'none';
        const fileInput = editArea.querySelector('input[type="file"]');
        fileInput.value = '';
        editArea.querySelector('.uploading').style.display = 'none';
        const saveBtn = editArea.querySelector('.save-file-btn');
        saveBtn.disabled = false;
      });
    });

    container.querySelectorAll('.remove-file-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const owner = this.dataset.owner;
        if (confirm(`Удалить файл ${owner === 'Dima' ? 'Димы' : 'Максима'}?`)) {
          updateFileUrl(id, owner, null);
          const editArea = document.getElementById(`edit-${id}-${owner}`);
          editArea.style.display = 'none';
        }
      });
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ---- Обработчик добавления новой ачивки ----
  document.getElementById('addBtn').addEventListener('click', function() {
    const titleInput = document.getElementById('titleInput');
    const descInput = document.getElementById('descInput');
    const title = titleInput.value.trim();
    const desc = descInput.value.trim();

    if (!title) {
      alert('Введите название ачивки!');
      return;
    }

    addAchievement(title, desc);
    titleInput.value = '';
    descInput.value = '';
    titleInput.focus();
  });

  document.getElementById('titleInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('addBtn').click();
    }
  });

  // ---- Старт ----
  subscribeToAchievements();
</script>
</body>
</html>
